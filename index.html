<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background-color: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .ticker-container {
            display: flex;
            width: 100vw;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.8); /* Semi-transparent black */
            align-items: center;
        }

        .label {
            background-color: #d32f2f; /* Citizen Red */
            color: white;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
        }

        .scroll-text {
            white-space: nowrap;
            color: white;
            font-size: 20px;
            padding-left: 20px;
            /* The Animation */
            animation: scroll 20s linear infinite;
        }

        @keyframes scroll {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <div class="ticker-container">
        <div class="label">BREAKING NEWS</div>
        <div class="scroll-text">
            KENYA NEWS UPDATE: Latest developments in the country • Economy shows signs of recovery • Stay tuned for more updates • Citizen style ticker active!
        </div>
    </div>
</body>
  </html>
